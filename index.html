<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            /* La magia del fondo */
            background-image: url('./background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #main-container {
            background: rgba(0, 0, 0, 0.6); /* Transparencia para leer mejor */
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        #champ-img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #ffcc00;
            margin-bottom: 10px;
        }

        #runes-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }

        .rune-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #aaa;
            transition: transform 0.2s;
        }
        
        .rune-icon:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <div id="main-container">
        <img id="champ-img" src="" alt="Campeón">
        <h2 id="champ-name" style="margin: 0; font-size: 18px;">Seleccionando...</h2>
        <div id="runes-container"></div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        ipcRenderer.on('update-ui', (e, data) => {
            console.log("Datos recibidos:", data); // <--- MIRA ESTO EN LA CONSOLA (Ctrl+Shift+I)
        
            if (data.name) document.getElementById('champ-name').innerText = data.name;
            if (data.champIcon) document.getElementById('champ-img').src = data.champIcon;
        
        const container = document.getElementById('runes-container');
        container.innerHTML = '';
        
        if (data.runes) {
            data.runes.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                img.className = 'rune-icon';
                container.appendChild(img);
            });
        }
    });
</script>
</body>
</html>
